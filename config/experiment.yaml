# All locked experiment parameters — the pre-registered CONTRACT of the experiment.
# config/experiment.yaml is version-controlled and FROZEN. Secrets live in .env only.

account:
  paper_balance_usd: 50000
  risk_per_trade_pct: 0.5        # allowed range 0.5–1.0

sample:
  verdict_trades: 100            # binding verdict
  interim_trades: 50             # suggestive only

reward:
  base_ratio: 2.0
  high_confidence_ratio: 3.0
  high_confidence_unlocked: false   # flips true ONLY after confidence is proven calibrated

validation:
  walk_forward_efficiency_min: 0.5
  embargo_days: 30
  in_sample_min_trades: 100

walk_forward:                    # rolling window geometry (in bars of the chosen timeframe)
  in_sample_bars: 1500
  out_of_sample_bars: 500
  step_bars: 500                 # how far each window advances (anchored=false => rolling)
  anchored: false

benchmark:
  type: buy_and_hold_gold_plus_risk_free
  risk_free_annual_pct: 4.0      # for Sharpe/Sortino excess-return + benchmark yield

profitability:                   # ALL must hold, out-of-sample, after costs
  require_beats_benchmark: true
  sortino_min: 1.0
  require_statistical_significance: true
  multiple_testing_correction: deflated_sharpe   # or 'bonferroni'

stretch_metric:
  weekly_return_pct_range: [2, 3]   # LOGGED ONLY — not pass/fail

safety:                          # (default) values — tune as needed
  daily_loss_breaker_pct: 3
  max_drawdown_breaker_pct: 10
  max_open_positions: 1
  calendar_blackout_events: [FOMC, CPI, NFP]
  max_api_calls_per_cycle: 20
  fail_closed: true

data:
  closed_candles_only: true
  model_costs: true              # spread, slippage, commission
  provider: twelvedata           # market-data provider (abstracted; swappable, e.g. oanda)
  store_dir: data/store          # parquet candle store (git-ignored)
  timeframes: [1h, 4h, 1day]     # candidate TFs for Phase 1; FROZEN to one at graduation
  max_history_batches: 6         # 5000-row pages to page back through per timeframe

instruments:                     # the frozen universe (Phase-1 strategy picks ONE)
  xauusd:
    provider_symbol: "XAU/USD"   # gold spot vs USD
    type: forex
  us30:
    provider_symbol: "DJI"       # Dow Jones Industrial Average (US30)
    type: index

costs:                           # modelled per side in the backtest engine (price units)
  xauusd:
    half_spread_price: 0.15      # ~0.30 full spread on gold
    slippage_price: 0.10
    commission_per_trade_usd: 0.0
  us30:
    half_spread_price: 1.0       # ~2 pt spread on the Dow CFD
    slippage_price: 1.0
    commission_per_trade_usd: 0.0

news:
  provider: finnhub              # news + sentiment ONLY (economic calendar is curated, see below)
  lookback_days: 7

economic_calendar:
  source: curated                # Finnhub's calendar is premium-gated; we curate publicly-scheduled dates
  blackout_hours_before: 24
  blackout_hours_after: 24

agent:
  timeframe: null                # AI commits this in Phase 1, then FROZEN
  instrument: null               # AI commits this in Phase 1, then FROZEN
